version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        # Output is a public static index; 0644/0755 are correct.
        - G301
        - G306
